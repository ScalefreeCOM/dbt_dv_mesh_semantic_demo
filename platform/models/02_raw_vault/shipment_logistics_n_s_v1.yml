version: 2

models:
  - name: shipment_logistics_n_s_v1
    description: "Standard satellite v1 (with load_end_date) for shipment_h"
    config:
      tags: ['satellite', 'v1', 'raw_vault']
    columns:
      - name: hk_shipment_h
        description: "Parent entity hash key"
        data_tests:
          - not_null
      - name: hd_shipment_logistics_n_s
        description: "Hash diff for change detection"
      - name: carrier
        description: "Payload column"
      - name: tracking_number
        description: "Payload column"
      - name: estimated_delivery_date
        description: "Payload column"
      - name: shipped_at
        description: "Payload column"
      - name: delivered_at
        description: "Payload column"
      - name: shipment_status
        description: "Payload column"
      - name: ldts
        description: "Load date timestamp"
      - name: load_end_date
        description: "Load end date (when this version was superseded)"
      - name: is_current
        description: "Flag indicating if this is the current version"
