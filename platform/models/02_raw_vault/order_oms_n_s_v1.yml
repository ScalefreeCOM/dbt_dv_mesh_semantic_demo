version: 2

models:
  - name: order_oms_n_s_v1
    description: "Standard satellite v1 (with load_end_date) for order_h"
    config:
      tags: ['satellite', 'v1', 'raw_vault']
    columns:
      - name: hk_order_h
        description: "Parent entity hash key"
        data_tests:
          - not_null
      - name: hd_order_oms_n_s
        description: "Hash diff for change detection"
      - name: order_date
        description: "Payload column"
      - name: order_status
        description: "Payload column"
      - name: channel
        description: "Payload column"
      - name: shipping_city
        description: "Payload column"
      - name: shipping_country
        description: "Payload column"
      - name: shipping_method
        description: "Payload column"
      - name: discount_code
        description: "Payload column"
      - name: discount_amount
        description: "Payload column"
      - name: ldts
        description: "Load date timestamp"
      - name: load_end_date
        description: "Load end date (when this version was superseded)"
      - name: is_current
        description: "Flag indicating if this is the current version"
