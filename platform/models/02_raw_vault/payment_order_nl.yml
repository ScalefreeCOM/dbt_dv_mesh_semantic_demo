version: 2

models:
  - name: payment_order_nl
    description: "Non-historized link connecting payments to orders"
    config:
      tags: ['non_historized_link', 'raw_vault']
    columns:
      - name: hk_payment_order_nl
        description: "Link hash key"
        data_tests:
          - unique
          - not_null
      - name: hk_payment_h
        description: "Foreign key to payment hub"
        data_tests:
          - not_null
      - name: hk_order_h
        description: "Foreign key to order hub"
        data_tests:
          - not_null
      - name: ldts
        description: "Load date timestamp"
      - name: rsrc
        description: "Record source"
