name: 'marketing'
version: '1.0.0'
dbt-cloud:
    project-id: 538636
require-dbt-version: [">=1.9.0"]
profile: 'marketing'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
